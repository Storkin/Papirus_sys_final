{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="utf-8">
    <title>{% trans "Restarting..." %} - Papirus SYS</title>
    <link href="{% static 'vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/sb-admin-2.min.css' %}" rel="stylesheet">
</head>
<body class="bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center text-white" style="margin-top:18%">
                <i class="fas fa-sync-alt fa-spin fa-3x mb-3"></i>
                <h3>{% trans "Restarting the application..." %}</h3>
                <p>{% trans "Please wait a few seconds. The application will reopen by itself." %}</p>
                <p class="small mt-4">
                    {% trans "If it does not reopen, double-click the 'Papirus SYS' icon on the desktop." %}
                </p>
            </div>
        </div>
    </div>
</body>
</html>
